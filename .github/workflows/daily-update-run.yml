on:
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: write

jobs:
  update-repo:
    runs-on: ubuntu-slim
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-python@v6
      with:
        python-version: "3.13"
        cache: "pip"
    - run: pip install -r requirements.txt
    - run: python3 update.py 
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}